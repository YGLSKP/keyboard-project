  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:var(--ui);
    background:
      radial-gradient(1200px 700px at 72% -12%, #fdfaf3 0%, transparent 60%),
      radial-gradient(900px 600px at 8% 112%, #efe9db 0%, transparent 55%),
      var(--bg);
    color:var(--text); display:flex; align-items:center; justify-content:center;
    min-height:100dvh; padding:20px;
  }
  .phone{
    width:380px; max-width:100%; height:760px; max-height:94dvh;
    background:var(--surface); border-radius:34px; overflow:hidden; position:relative;
    box-shadow:0 24px 70px rgba(60,50,30,.18), 0 2px 8px rgba(60,50,30,.06), inset 0 0 0 1px rgba(0,0,0,.04);
    display:flex; flex-direction:column;
  }
  .screen{position:absolute; inset:0; display:flex; flex-direction:column; opacity:0; pointer-events:none; transition:opacity .5s ease;}
  .screen.active{opacity:1; pointer-events:auto;}

  /* 브랜드 미션 배경: 밝은 화이트 워시로 은은하게 */
  #s-play.bg-casetify, #s-done.bg-casetify{
    background:
      linear-gradient(180deg, rgba(245,242,234,.62) 0%, rgba(245,242,234,.88) 54%, rgba(245,242,234,.97) 100%),
      var(--brand-bg) 36% 20%/cover no-repeat;
  }
  #s-play.bg-stanbru, #s-done.bg-stanbru{
    background:
      linear-gradient(180deg, rgba(245,242,234,.58) 0%, rgba(245,242,234,.86) 52%, rgba(245,242,234,.97) 100%),
      var(--stanbru-bg) center 24%/cover no-repeat;
  }
  #s-play.bg-lotteria, #s-done.bg-lotteria{
    background:
      linear-gradient(180deg, rgba(245,242,234,.60) 0%, rgba(245,242,234,.87) 52%, rgba(245,242,234,.97) 100%),
      var(--lotteria-bg) center 20%/cover no-repeat;
  }
  #s-play.bg-casetify .sky h1, #s-play.bg-stanbru .sky h1, #s-play.bg-lotteria .sky h1{text-shadow:0 1px 10px rgba(255,255,255,.85);}

  /* ===== 미션 선택 ===== */
  .select{flex:1; display:flex; flex-direction:column; padding:34px 24px 24px; position:relative; overflow-y:auto;}
  .select .const{position:absolute; inset:0; overflow:hidden; pointer-events:none;}
  .select .const b{position:absolute; width:3px; height:3px; border-radius:50%; background:#d8ceb4; opacity:.5;}
  .select .kicker{font-size:11px; letter-spacing:.3em; color:var(--wind); text-transform:uppercase; position:relative;}
  .select h1{font-size:30px; font-weight:800; margin:8px 0 4px; position:relative; color:var(--text);}
  .select .date{color:var(--text-dim); font-size:13px; margin-bottom:24px; position:relative;}

  .mcard{position:relative; display:flex; gap:14px; align-items:center; text-align:left; width:100%; border:1px solid var(--line); border-radius:18px; padding:18px; margin-bottom:14px; cursor:pointer; background:var(--surface); box-shadow:0 4px 14px rgba(70,60,40,.05); transition:transform .12s, border-color .2s, box-shadow .2s;}
  .mcard:active{transform:scale(.99);}
  .mcard:hover{border-color:var(--line-2); box-shadow:0 8px 22px rgba(70,60,40,.09);}
  .mcard-body{flex:1; min-width:0;}
  .mcard-thumb{width:92px; height:86px; border-radius:11px; flex:none; align-self:flex-end; background-size:cover; background-position:center; border:1px solid var(--line);}
  .mcard-thumb.t-casetify{background-image:var(--thumb-casetify);}
  .mcard-thumb.t-stanbru{background-image:var(--thumb-stanbru); background-position:center 42%;}
  .mcard .tagline{font-size:11px; letter-spacing:.16em; margin-bottom:9px; font-weight:700;}
  .mcard.poem .tagline{color:var(--star);}
  .mcard.brand .tagline{color:var(--brand);}
  .mcard.brand2 .tagline{color:var(--brand2);}
  .mcard.brand3 .tagline{color:var(--brand3);}
  .mcard .mt{font-size:24px; font-weight:800; margin-bottom:5px; color:var(--text);}
  .mcard-logo{height:30px; width:auto; max-width:150px; display:block; margin:2px 0 7px; object-fit:contain; object-position:left center;}
  .mcard.brand3 .mcard-logo{height:18px; max-width:118px;}
  .mcard .ms{font-size:12px; color:var(--text-dim); line-height:1.5;}
  .mcard .preview{margin-top:12px; font-size:13px; color:var(--text-dim); line-height:1.5; border-left:2px solid; padding-left:10px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .mcard.poem .preview{border-color:var(--star);}
  .mcard.brand .preview{border-color:var(--brand);}
  .mcard.brand2 .preview{border-color:var(--brand2);}
  .mcard-thumb.t-lotteria{background-image:var(--thumb-lotteria); background-position:center 40%;}
  .mcard.brand3 .preview{border-color:var(--brand3);}

  /* ===== 미션 플레이 ===== */
  .sky{position:relative; padding:22px 22px 14px; flex:none; background:transparent;}
  .home-btn{position:absolute; top:14px; right:14px; z-index:20; display:inline-flex; align-items:center; gap:6px; font-family:inherit; font-size:12px; font-weight:700; line-height:1; color:var(--text); background:rgba(255,255,255,.74); border:1px solid var(--line); border-radius:99px; padding:8px 13px 8px 11px; cursor:pointer; -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); box-shadow:0 2px 10px rgba(70,60,40,.10);}
  .home-btn svg{display:block; width:15px; height:15px;}
  .home-btn:active{transform:scale(.96);}
  .sky .eyebrow{font-size:11px; letter-spacing:.28em; color:var(--wind); font-weight:700;}
  .sky.brand .eyebrow{color:var(--brand);}
  .sky.brand2 .eyebrow{color:var(--brand2);}
  .sky.brand3 .eyebrow{color:var(--brand3);}
  .sky h1{font-weight:800; font-size:24px; margin:6px 0 2px; letter-spacing:.01em; color:var(--text);}
  .play-logo{display:none; height:38px; width:auto; margin:10px 0 2px; padding:5px 9px; background:#fff; border-radius:9px; box-shadow:0 2px 10px rgba(60,50,30,.12);}
  .sky.brand .play-logo.l-casetify{display:inline-block;}
  .sky.brand2 .play-logo.l-stanbru{display:inline-block;}
  .sky.brand3 .play-logo.l-lotteria{display:inline-block;}
  .done-logo{display:none; height:34px; width:auto; margin-bottom:14px; padding:5px 9px; background:#fff; border-radius:9px; box-shadow:0 2px 10px rgba(60,50,30,.12);}
  .card.brand .done-logo.l-casetify{display:inline-block;}
  .card.brand2 .done-logo.l-stanbru{display:inline-block;}
  .card.brand3 .done-logo.l-lotteria{display:inline-block;}
  .stars-row{display:flex; gap:6px; margin-top:14px; align-items:center; flex-wrap:wrap;}
  .star-dot{width:14px; height:14px; opacity:.26; transition:opacity .5s, transform .5s;}
  .star-dot svg{width:100%; height:100%; display:block;}
  .star-dot.lit{opacity:1; transform:scale(1.12); filter:drop-shadow(0 0 5px rgba(199,146,40,.6));}
  .meta{display:flex; gap:14px; margin-top:14px; font-size:12px; color:var(--text-dim);}
  .meta b{color:var(--text); font-weight:700;}

  .stage{flex:1; padding:6px 22px 0; display:flex; flex-direction:column; min-height:0; overflow-y:auto;}
  .progress-hint{font-size:12px; color:var(--text-dim); margin:8px 0 14px;}
  .progress-hint b{color:var(--star);}
  .target{font-size:22px; line-height:1.5; letter-spacing:.01em; color:var(--text); min-height:66px; display:flex; align-items:center; flex-wrap:wrap; font-weight:700;}
  .target .ch{transition:color .12s;}
  .target .ch.done{color:var(--star);}
  .target .ch.wrong{color:var(--bad); text-decoration:underline wavy var(--bad);}
  .target .ch.cursor{border-bottom:2px solid var(--wind);}

  .wongo-wrap{margin-top:16px;}
  .wongo-label{font-size:11px; letter-spacing:.14em; color:var(--text-dim); text-transform:uppercase; margin-bottom:8px; font-weight:700;}
  .wongo{display:block; width:100%; border:1px solid var(--parchment-line); outline:none; -webkit-appearance:none; appearance:none; background:var(--parchment); border-radius:12px; padding:14px; color:#3a3324; font-size:19px; line-height:1.6; min-height:56px; background-image:linear-gradient(90deg, transparent 0 calc(100% - 1px), var(--parchment-line) 0); box-shadow:0 4px 14px rgba(70,60,40,.06); transition:box-shadow .2s, border-color .2s;}
  .wongo::placeholder{color:#b6ab90;}
  .wongo:focus{border-color:var(--wind); box-shadow:0 0 0 3px rgba(63,124,174,.16);}

  .stats-line{display:flex; gap:16px; margin-top:12px; font-size:12px; color:var(--text-dim);}
  .combo{color:var(--star); font-weight:700; opacity:0; transform:translateY(4px); transition:.3s;}
  .combo.show{opacity:1; transform:none;}

  .ledger{margin-top:14px; margin-bottom:6px; background:var(--surface-2); border:1px solid var(--line); border-radius:14px; padding:14px 16px;}
  .ledger .top{display:flex; justify-content:space-between; align-items:baseline;}
  .ledger .top span{font-size:12px; color:var(--text-dim);}
  .ledger .amount{font-size:22px; color:var(--star); font-weight:800;}
  .bar{height:6px; border-radius:99px; background:#e6ddc9; margin-top:10px; overflow:hidden;}
  .bar>i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--wind),var(--star-soft)); transition:width .6s;}
  .ledger .note{font-size:11px; color:var(--text-mute); margin-top:8px;}
  .ledger .note b{color:var(--text-dim);}

  .dock{flex:none; padding:12px 22px 20px; background:linear-gradient(180deg,transparent, var(--surface) 45%);}
  .tip{font-size:11px; color:var(--text-mute); text-align:center; margin-bottom:10px;}
  .btn{width:100%; border:0; border-radius:14px; padding:15px; font-family:var(--ui); font-size:15px; font-weight:800; cursor:pointer; color:#40320c; background:linear-gradient(180deg,var(--star-soft),var(--star)); box-shadow:0 8px 20px rgba(199,146,40,.28); transition:transform .12s, opacity .2s; position:relative; z-index:2;}
  .btn:active{transform:translateY(1px);}
  .btn.ghost{background:transparent; color:var(--wind); box-shadow:none; border:1px solid var(--line-2); font-weight:600;}
  .btn:disabled{opacity:.4; cursor:default;}
  .btn-row{display:flex; gap:10px;}

  .ad{position:absolute; inset:0; background:rgba(245,242,234,.94); backdrop-filter:blur(6px); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:30; padding:30px; text-align:center;}
  .ad.show{display:flex;}
  .ad .cnt{font-size:60px; color:var(--star); font-weight:800;}
  .ad .lbl{color:var(--text-dim); font-size:13px; margin-top:8px; letter-spacing:.06em;}
  .ad .mock{margin-top:26px; width:210px; height:118px; border-radius:14px; background:linear-gradient(135deg,#dfe8f2,#c9d8ea); display:flex; align-items:center; justify-content:center; color:#5b6b82; font-size:12px; letter-spacing:.16em; border:1px solid rgba(0,0,0,.06);}

  /* ===== 완주 ===== */
  .done-scr{flex:1; display:flex; flex-direction:column; padding:24px 22px; overflow-y:auto;}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:22px; position:relative; overflow:hidden; box-shadow:0 8px 24px rgba(70,60,40,.07);}
  .card::after{content:""; position:absolute; top:-40px; right:-30px; width:150px; height:150px; background:radial-gradient(circle, rgba(230,181,82,.20), transparent 70%); pointer-events:none;}
  .card.brand::after{background:radial-gradient(circle, rgba(240,85,75,.16), transparent 70%);}
  .card.brand2::after{background:radial-gradient(circle, rgba(61,128,214,.18), transparent 70%);}
  .card.brand3::after{background:radial-gradient(circle, rgba(245,182,0,.26), transparent 70%);}
  .card .tag{font-size:11px; letter-spacing:.24em; color:var(--wind); font-weight:700;}
  .card.brand .tag{color:var(--brand);}
  .card.brand2 .tag{color:var(--brand2);}
  .card.brand3 .tag{color:var(--brand3);}
  .card h3{font-size:23px; margin:8px 0 18px; font-weight:800; color:var(--text);}
  .recap{font-size:14px; line-height:1.8; color:var(--text); white-space:pre-line; border-left:2px solid var(--star); padding-left:14px;}
  .card.brand .recap{border-left-color:var(--brand); font-size:13px; line-height:1.75;}
  .card.brand2 .recap{border-left-color:var(--brand2); font-size:13px; line-height:1.75;}
  .card.brand3 .recap{border-left-color:var(--brand3); font-size:13px; line-height:1.75;}
  .grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-top:20px;}
  .stat{background:var(--surface-2); border:1px solid var(--line); border-radius:12px; padding:12px 10px; text-align:center;}
  .stat .n{font-size:22px; color:var(--star); font-weight:800;}
  .stat .k{font-size:10px; color:var(--text-dim); margin-top:3px; letter-spacing:.05em;}

  .reward{margin-top:18px; background:var(--surface-2); border:1px solid var(--line); border-radius:14px; padding:16px;}
  .reward-row{display:flex; justify-content:space-between; align-items:baseline; font-size:13px; color:var(--text-dim);}
  .reward-row b{color:var(--star); font-size:24px; font-weight:800;}

  .brand-cta{margin-top:16px; display:none;}
  .brand-cta.show{display:block;}
  .brand-cta .cta-title{font-size:12px; color:var(--brand); letter-spacing:.04em; margin-bottom:10px; text-align:center; font-weight:700;}
  .brand-cta.brand2 .cta-title{color:var(--brand2);}
  .brand-cta.brand2 .btn.brand-fill{background:linear-gradient(180deg,var(--brand2-soft),var(--brand2)); box-shadow:0 8px 20px rgba(31,95,176,.28);}
  .brand-cta.brand2 .btn.brand-ghost{color:var(--brand2); border-color:rgba(31,95,176,.42);}
  .brand-cta.brand3 .cta-title{color:var(--brand3);}
  .brand-cta.brand3 .btn.brand-fill{background:linear-gradient(180deg,var(--brand3-soft),var(--brand3)); box-shadow:0 8px 20px rgba(227,13,30,.28);}
  .brand-cta.brand3 .btn.brand-ghost{color:var(--brand3); border-color:rgba(227,13,30,.42);}
  .brand-link{display:block; text-align:center; text-decoration:none; margin-bottom:10px;}
  .btn.brand-fill{background:linear-gradient(180deg,var(--brand-soft),var(--brand)); box-shadow:0 8px 20px rgba(229,55,46,.28); color:#ffffff;}
  .btn.brand-ghost{background:transparent; color:var(--brand); border:1px solid rgba(229,55,46,.42); box-shadow:none;}
  .btn.benefit{background:linear-gradient(180deg,var(--star-soft),var(--star)); color:#3a2c08; font-weight:800; box-shadow:0 10px 26px rgba(199,146,40,.38); position:relative;}
  .btn.benefit .badge{display:inline-block; background:rgba(58,44,8,.18); color:#3a2c08; font-size:10px; font-weight:800; letter-spacing:.06em; padding:2px 8px; border-radius:99px; margin-right:8px; vertical-align:middle;}

  .done-actions{margin-top:18px;}
  .toast{position:absolute; left:50%; bottom:96px; transform:translateX(-50%) translateY(10px); background:#2a2f38; color:#fff; font-size:12px; padding:10px 16px; border-radius:99px; box-shadow:0 6px 20px rgba(0,0,0,.2); opacity:0; transition:.3s; z-index:40; white-space:nowrap; max-width:80%; text-align:center;}
  .toast.show{opacity:1; transform:translateX(-50%);}

  @media (prefers-reduced-motion: reduce){*{animation:none !important; transition:none !important;}}
</style>
</head>

  function calcRev(impr, ecpm){ return Math.round(impr * (ecpm/1000)); }
  function totalImpr(){ return M.lines.length + (M.adBreak>=0 ? 1 : 0); }

  var screens = { select:$("s-select"), play:$("s-play"), done:$("s-done") };
  function show(name){ for(var k in screens){ screens[k].classList.remove("active"); } screens[name].classList.add("active"); }

  (function seedStars(){
    var c=$("const"); if(!c) return;
    for(var i=0;i<26;i++){ var b=document.createElement("b"); b.style.left=(Math.random()*100)+"%"; b.style.top=(Math.random()*100)+"%"; b.style.opacity=(0.2+Math.random()*0.5).toFixed(2); c.appendChild(b); }
  })();

  function starSVG(){ return '<svg viewBox="0 0 24 24"><path fill="var(--star)" d="M12 2l2.6 6.3 6.8.5-5.2 4.4 1.7 6.6L12 16.9 6.3 20.3 8 13.7 2.8 9.3l6.8-.5z"/></svg>'; }
  function renderStars(){
    var wrap=$("stars"); wrap.innerHTML="";
    for(var i=0;i<M.lines.length;i++){ var d=document.createElement("div"); d.className="star-dot"+(i<starsLit?" lit":""); d.innerHTML=starSVG(); wrap.appendChild(d); }
  }

  function renderTarget(){
    var t=M.lines[cur], wrap=$("target"); wrap.innerHTML="";
    for(var i=0;i<t.length;i++){
      var s=document.createElement("span"); s.className="ch"; s.textContent = (t[i]===" ") ? "\u00A0" : t[i];
      if(i<typed.length){ s.classList.add(typed[i]===t[i] ? "done" : "wrong"); }
      else if(i===typed.length){ s.classList.add("cursor"); }
      wrap.appendChild(s);
    }
    $("m-linelen").textContent = t.length;
  }

  function updMeta(){
    $("m-line").textContent = Math.min(cur+1, M.lines.length);
    $("m-total").textContent = M.lines.length;
    $("m-star").textContent = starsLit;
    var acc = (totalKeys===0) ? 100 : Math.max(0, Math.round((1 - mistakes/Math.max(totalKeys,1))*100));
    $("m-acc").textContent = acc + "%";
    pool = calcP(impressions, M.cpmDefault, PO_DEFAULT);
    $("pool").textContent = pool + "P";
    $("poolbar").style.width = Math.min(100, (impressions/totalImpr())*100) + "%";
  }

  function focusInput(){ $("input").focus(); }

  function flashCombo(){
    var c=$("combo"); c.textContent = "완료 · 엔터로 다음 ↵"; c.classList.add("show");
    setTimeout(function(){ c.classList.remove("show"); }, 2000);
  }

  function evaluate(isComposing){
    var t=M.lines[cur];
    typed = $("input").value;
    if(!isComposing && typed.length > prevLen){
      for(var i=prevLen;i<typed.length;i++){ totalKeys++; if(typed[i] !== t[i]) mistakes++; }
    }
    if(!isComposing){ prevLen = typed.length; }
    renderTarget(); updMeta();
    var complete = eq(typed, t);
    $("next").disabled = !complete;
    if(complete) flashCombo();
  }

  function loadCurrentLine(){
    if(cur >= M.lines.length) return;
    typed=""; prevLen=0; $("input").value="";
    $("next").disabled=true; $("sky-title").textContent = M.playTitle;
    renderTarget(); updMeta(); focusInput();
  }

  function playAdThen(cb){
    locked=true;
    var ad=$("ad"); ad.classList.add("show");
    var n=3; $("ad-cnt").textContent=n;
    adIv=setInterval(function(){
      n--;
      if(n>0){ $("ad-cnt").textContent=n; }
      else{ clearInterval(adIv); adIv=null; ad.classList.remove("show"); locked=false; cb(); }
    },1000);
  }
  function stopAd(){ if(adIv){ clearInterval(adIv); adIv=null; } $("ad").classList.remove("show"); locked=false; }

  function nextLine(){
    if(locked) return;
    if(!eq($("input").value, M.lines[cur])) return;
    starsLit++;
    impressions++;
    renderStars(); updMeta();
    cur++;
    if(cur >= M.lines.length){ finish(); return; }
    if(cur === M.adBreak){
      playAdThen(function(){ impressions++; updMeta(); loadCurrentLine(); });
    } else {
      loadCurrentLine();
    }
  }

  function finish(){
    var secs=Math.round((Date.now()-startAt)/1000);
    var mm=Math.floor(secs/60), ss=String(secs%60).padStart(2,"0");
    $("done-tag").textContent = M.doneTag;
    $("done-title").textContent = M.doneTitle;
    $("recap").textContent = M.recap;
    $("d-star").textContent = starsLit;
    $("d-star-label").textContent = M.starLabel;
    $("d-acc").textContent = $("m-acc").textContent;
    $("d-time").textContent = mm + ":" + ss;
    $("r-pool").textContent = pool + "P";
    $("pool-label").textContent = M.poolLabel;
    $("done-card").classList.remove("brand","brand2","brand3");
    if(M.accent) $("done-card").classList.add(M.accent);
    $("s-done").classList.remove("bg-casetify","bg-stanbru","bg-lotteria");
    if(M.bgClass) $("s-done").classList.add(M.bgClass);
    renderCta();
    show("done");
  }

  function renderCta(){
    var box=$("brand-cta"), wrap=$("cta-links");
    box.classList.remove("show","brand","brand2","brand3");
    wrap.innerHTML="";
    if(!M.cta){ return; }
    $("cta-title").textContent = M.cta.title;
    if(M.accent) box.classList.add(M.accent);
    M.cta.links.forEach(function(link){
      var el;
      if(link.url){
        el=document.createElement("a");
        el.href=link.url; el.target="_blank"; el.rel="noopener noreferrer";
      } else {
        el=document.createElement("button");
        el.type="button";
        el.addEventListener("click", function(){
          if(link.action==="okcashbag") toast("OK캐쉬백 쿠폰 받기로 연결됩니다 (데모)");
          else toast("연결됩니다 (데모)");
        });
      }
      var cls = "btn brand-link ";
      if(link.style==="fill") cls += "brand-fill";
      else if(link.style==="benefit") cls += "benefit";
      else cls += "brand-ghost";
      el.className = cls;
      if(link.badge){ el.innerHTML = '<span class="badge">'+link.badge+'</span>' + link.label; }
      else { el.textContent = link.label; }
      wrap.appendChild(el);
    });
    box.classList.add("show");
  }

  function applyMission(){
    $("p-eyebrow").textContent = M.eyebrow;
    $("sky-title").textContent = M.playTitle;
    $("p-hint").innerHTML = M.hint;
    $("m-star-label").textContent = M.starLabel;
    $("ledger-note").textContent = M.ledgerNote;
    $("sky").classList.remove("brand","brand2","brand3");
    if(M.accent) $("sky").classList.add(M.accent);
    $("s-play").classList.remove("bg-casetify","bg-stanbru","bg-lotteria");
    if(M.bgClass) $("s-play").classList.add(M.bgClass);
  }

  function startMission(key){
    stopAd();
    M = MISSIONS[key];
    cur=0; typed=""; prevLen=0; mistakes=0; totalKeys=0;
    impressions=0; pool=0; starsLit=0; startAt=Date.now();
    $("input").value="";
    applyMission(); renderStars(); renderTarget(); updMeta(); show("play");
    setTimeout(focusInput,300);
  }

  var toTimer;
  function toast(msg){ var t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toTimer); toTimer=setTimeout(function(){ t.classList.remove("show"); },1800); }

  // ==== 이벤트 연결 ====
  $("pick-seosi").addEventListener("click", function(){ startMission("seosi"); });
  $("pick-casetify").addEventListener("click", function(){ startMission("casetify"); });
  $("pick-stanbru").addEventListener("click", function(){ startMission("stanbru"); });
  $("pick-lotteria").addEventListener("click", function(){ startMission("lotteria"); });
  $("home-btn").addEventListener("click", function(){ stopAd(); show("select"); });
  $("next").addEventListener("click", nextLine);
  $("restart-btn").addEventListener("click", function(){ show("select"); });
  $("share-btn").addEventListener("click", function(){ toast("공유 카드가 저장되었어요 (데모)"); });

  var inp=$("input");
  inp.addEventListener("input", function(e){ evaluate(!!e.isComposing); });
  inp.addEventListener("compositionend", function(){ evaluate(false); });
  inp.addEventListener("keydown", function(e){
    if(e.key === "Enter" || e.keyCode === 13){
      if(e.isComposing) return;
      e.preventDefault();
      if(locked) return;
      if(eq($("input").value, M.lines[cur])) nextLine();
      else toast("이 줄을 끝까지 정확히 옮겨야 다음으로 넘어가요");
    }
  });
  ["paste","drop"].forEach(function(ev){
    inp.addEventListener(ev, function(e){ e.preventDefault(); toast("필사 미션에서는 붙여넣기를 사용할 수 없어요"); });
  });
})();
</script>
</body>
</html>
